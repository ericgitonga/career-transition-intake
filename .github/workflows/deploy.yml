name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/career-transition-intake:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/career-transition-intake:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy career-transition-intake \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/career-transition-intake:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "SMTP_USER=${{ secrets.SMTP_USER }},SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" \
            --project ${{ secrets.GCP_PROJECT_ID }}
