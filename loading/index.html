<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Career Transition Onboarding — Starting Up</title>
  <style>
    :root { --navy:#1B2A4A; --teal:#0E7C7B; --gold:#C9A84C; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      text-align: center;
      max-width: 420px;
      width: 90%;
      padding: 2.5rem 2rem;
    }

    .brand {
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2rem;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 3px solid #30363d;
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tagline {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #6e7681;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">Career Transition Onboarding</div>
  <div class="spinner"></div>
  <p class="tagline" id="tagline">Preparing your form&hellip;</p>
</div>

<script>
  const APP_URL = "https://career-transition-intake.onrender.com";
  const HEALTH  = APP_URL + "/_health";
  const POLL_MS = 3000; // how often to check if the app is up

  let redirecting = false;
  const tagline = document.getElementById("tagline");

  // Poll health endpoint
  async function poll() {
    if (redirecting) return;
    try {
      const res = await fetch(HEALTH, { cache: "no-store" });
      if (res.ok) {
        redirecting = true;
        tagline.textContent = "Ready — redirecting…";
        setTimeout(() => { window.location.replace(APP_URL); }, 400);
      }
    } catch (_) {
      // app not yet reachable — keep polling
    }
    if (!redirecting) setTimeout(poll, POLL_MS);
  }

  // Start first poll after a short delay (give the server a moment)
  setTimeout(poll, 2000);
</script>
</body>
</html>
