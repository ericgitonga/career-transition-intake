services:
  - type: web
    name: career-transition-intake
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: LOADING_SITE_ORIGIN
        value: https://career-transition-loading.onrender.com

  - type: static
    name: career-transition-loading
    staticPublishPath: .
    buildCommand: echo "static site, no build needed"
    routes:
      - type: rewrite
        source: /*
        destination: /loading.html
