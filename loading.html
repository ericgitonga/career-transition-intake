<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Career Transition Onboarding — Starting Up</title>
  <style>
    :root { --navy:#1B2A4A; --teal:#0E7C7B; --gold:#C9A84C; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      text-align: center;
      max-width: 420px;
      width: 90%;
      padding: 2.5rem 2rem;
    }

    .brand {
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: .6rem;
    }

    .sub {
      color: #8b949e;
      font-size: .9rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 3px solid #30363d;
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Countdown bar */
    .bar-wrap {
      background: #161b22;
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .bar-fill {
      height: 100%;
      background: var(--teal);
      border-radius: 4px;
      transition: width .8s linear;
      width: 0%;
    }

    .eta {
      font-size: .8rem;
      color: #6e7681;
    }

    .eta span { color: #8b949e; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">Career Transition Onboarding</div>
  <div class="spinner"></div>
  <h1>Application is starting up</h1>
  <p class="sub">
    The server wakes from sleep on first visit.<br>
    This usually takes <strong style="color:#e6edf3">20 – 40 seconds</strong>.
  </p>
  <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
  <p class="eta" id="eta">Estimated wait: <span id="countdown">40</span>s</p>
</div>

<script>
  const APP_URL = "https://career-transition-intake.onrender.com";
  const HEALTH  = APP_URL + "/_health";
  const TOTAL   = 40;   // seconds shown on the progress bar
  const POLL_MS = 3000; // how often to check if the app is up

  let elapsed = 0;
  let redirecting = false;

  // Progress bar + countdown
  const bar       = document.getElementById("bar");
  const countdown = document.getElementById("countdown");
  const eta       = document.getElementById("eta");

  const tick = setInterval(() => {
    elapsed++;
    const pct = Math.min(elapsed / TOTAL * 100, 97); // stop short of 100 until confirmed ready
    bar.style.width = pct + "%";
    const remaining = Math.max(TOTAL - elapsed, 0);
    countdown.textContent = remaining + "s";
    if (remaining === 0) {
      eta.textContent = "Still starting… almost there";
    }
  }, 1000);

  // Poll health endpoint
  async function poll() {
    if (redirecting) return;
    try {
      const res = await fetch(HEALTH, { cache: "no-store" });
      if (res.ok) {
        redirecting = true;
        clearInterval(tick);
        bar.style.transition = "width .3s ease";
        bar.style.width = "100%";
        eta.textContent = "Ready — redirecting…";
        setTimeout(() => { window.location.replace(APP_URL); }, 400);
      }
    } catch (_) {
      // app not yet reachable — keep polling
    }
    if (!redirecting) setTimeout(poll, POLL_MS);
  }

  // Start first poll after a short delay (give the server a moment)
  setTimeout(poll, 2000);
</script>
</body>
</html>
